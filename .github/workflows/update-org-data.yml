name: Update Organization Data & Deploy Pages

on:
  schedule:
    # Run every 2 days at 04:17 UTC (off-peak, odd minute to avoid load spikes)
    - cron: '17 4 */2 * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [main]
    paths: ['docs/**']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch organization data from CKAN APIs
        run: |
          python3 << 'PYEOF'
          import json, urllib.request, time, sys

          def fetch_json(url, retries=3, delay=15):
              """Fetch JSON with retries and delay between attempts."""
              for attempt in range(1, retries + 1):
                  try:
                      req = urllib.request.Request(url, headers={'User-Agent': 'inter-stats-collector/2.0'})
                      with urllib.request.urlopen(req, timeout=30) as resp:
                          return json.loads(resp.read())
                  except Exception as e:
                      print(f"  Attempt {attempt}/{retries} failed: {e}")
                      if attempt < retries:
                          time.sleep(delay)
              return None

          # Fetch Swiss orgs
          print("Fetching Swiss opendata.swiss organizations...")
          swiss = fetch_json("https://ckan.opendata.swiss/api/3/action/organization_list?all_fields=true&limit=500")
          if swiss and swiss.get("success"):
              total = len(swiss["result"])
              active = sum(1 for o in swiss["result"] if o.get("package_count", 0) > 0)
              print(f"  Swiss: {total} organizations ({active} with datasets)")
              with open("docs/swiss-orgs-data.json", "w") as f:
                  json.dump(swiss, f)
          else:
              print("  WARNING: Could not fetch Swiss orgs, pages will use live API fallback")

          time.sleep(5)  # polite delay between APIs

          # Fetch HDX orgs (paginated)
          print("Fetching HDX organizations...")
          hdx1 = fetch_json("https://data.humdata.org/api/3/action/organization_list?all_fields=true&limit=500")
          time.sleep(3)
          hdx2 = fetch_json("https://data.humdata.org/api/3/action/organization_list?all_fields=true&limit=500&offset=500")

          if hdx1 and hdx1.get("success"):
              if hdx2 and hdx2.get("success"):
                  hdx1["result"].extend(hdx2["result"])
              total = len(hdx1["result"])
              active = sum(1 for o in hdx1["result"] if o.get("package_count", 0) > 0)
              print(f"  HDX: {total} organizations ({active} with datasets)")
              with open("docs/hdx-orgs-data.json", "w") as f:
                  json.dump(hdx1, f)
          else:
              print("  WARNING: Could not fetch HDX orgs, pages will use live API fallback")

          print("Done.")
          PYEOF

      - name: Add timestamp metadata
        run: |
          python3 -c "
          import json, datetime
          ts = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          meta = {'fetched_at': ts}
          with open('docs/org-data-meta.json', 'w') as f:
              json.dump(meta, f)
          print(f'Timestamp: {ts}')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
