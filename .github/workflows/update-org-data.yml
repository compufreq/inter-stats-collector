name: Update Organization Data & Deploy Pages

on:
  schedule:
    # Run every 2 days at 04:17 UTC (off-peak, odd minute to avoid load spikes)
    - cron: '17 4 */2 * *'
  workflow_dispatch: # Allow manual trigger
  push:
    branches: [main]
    paths: ['docs/**']

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  fetch-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Fetch Swiss opendata.swiss organizations
        run: |
          echo "Fetching Swiss orgs..."
          curl -sf --retry 3 --retry-delay 10 \
            "https://ckan.opendata.swiss/api/3/action/organization_list?all_fields=true&limit=500" \
            -o docs/swiss-orgs-data.json
          python3 -c "
          import json
          with open('docs/swiss-orgs-data.json') as f:
              data = json.load(f)
          orgs = [o for o in data['result'] if o.get('package_count', 0) > 0]
          print(f'Swiss: {len(orgs)} organizations with datasets')
          "

      - name: Fetch HDX organizations (paginated)
        run: |
          echo "Fetching HDX orgs (page 1)..."
          curl -sf --retry 3 --retry-delay 10 \
            "https://data.humdata.org/api/3/action/organization_list?all_fields=true&limit=500" \
            -o /tmp/hdx_page1.json

          echo "Fetching HDX orgs (page 2)..."
          curl -sf --retry 3 --retry-delay 10 \
            "https://data.humdata.org/api/3/action/organization_list?all_fields=true&limit=500&offset=500" \
            -o /tmp/hdx_page2.json

          python3 -c "
          import json
          with open('/tmp/hdx_page1.json') as f:
              d1 = json.load(f)
          with open('/tmp/hdx_page2.json') as f:
              d2 = json.load(f)
          d1['result'].extend(d2['result'])
          orgs = [o for o in d1['result'] if o.get('package_count', 0) > 0]
          print(f'HDX: {len(orgs)} organizations with datasets')
          with open('docs/hdx-orgs-data.json', 'w') as f:
              json.dump(d1, f)
          "

      - name: Add timestamp metadata
        run: |
          python3 -c "
          import json, datetime
          ts = datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ')
          meta = {'fetched_at': ts}
          with open('docs/org-data-meta.json', 'w') as f:
              json.dump(meta, f)
          print(f'Timestamp: {ts}')
          "

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
